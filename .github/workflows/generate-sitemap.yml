name: Deploy Jekyll to GitHub Pages (Optimized)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6  # 更新到v6
        with:
          fetch-depth: 0  # 保留这个配置，用于生成准确的sitemap lastmod

      - name: Setup Pages
        uses: actions/configure-pages@v6  # 更新到v6

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v2  # 更新到v2
        with:
          source: ./
          destination: ./_site

      - name: Minify static assets
        run: |
          npm install -g html-minifier terser
          find ./_site -name "*.html" -exec html-minifier --collapse-whitespace --remove-comments --minify-css true --minify-js true -o {} {} \;
          find ./_site -name "*.js" -exec terser --compress --mangle -o {} {} \;

      - name: Check for broken links
        run: |
          gem install html-proofer
          htmlproofer ./_site --allow-hash-href --check-html --disable-external

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4  # 更新到v4

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v6  # 更新到v6

      - name: Health check
        run: curl -f ${{ steps.deployment.outputs.page_url }}
